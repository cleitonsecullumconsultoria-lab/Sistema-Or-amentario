<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block page_title %}Dashboard{% endblock %} — ROV Sistema Orçamentário</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --azul:     #1D3557;
      --azul-md:  #2C4F7C;
      --azul-lt:  #457B9D;
      --verde:    #1D9E75;
      --verde-dk: #168a63;
      --cinza-bg: #F0F4F8;
      --cinza-bd: #D1DCE8;
      --branco:   #FFFFFF;
      --texto:    #1A2535;
      --texto-md: #4A5568;
      --pos:      #1D9E75;
      --neg:      #E05252;
      --neu:      #D4930A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cinza-bg); color: var(--texto); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--azul); color: #fff;
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      position: sticky; top: 0; z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .logo-badge {
      background: var(--verde); border-radius: 8px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; letter-spacing: 1px;
      flex-shrink: 0;
    }
    .logo-text h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .logo-text p  { font-size: 10px; opacity: .65; text-transform: uppercase; letter-spacing: .6px; }
    .header-env { font-size: 11px; color: rgba(255,255,255,.45); }

    /* ── Nav ── */
    nav { background: var(--azul-md); padding: 0 32px; }
    nav ul { list-style: none; display: flex; gap: 2px; }
    nav a {
      display: block; padding: 11px 18px;
      color: rgba(255,255,255,.7); text-decoration: none;
      font-size: 13px; font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav a:hover { color: #fff; border-bottom-color: rgba(255,255,255,.4); }
    nav a.active { color: #fff; border-bottom-color: var(--verde); }

    /* ── Page ── */
    .page { max-width: 1340px; margin: 0 auto; padding: 28px 24px 56px; }

    /* ── Page header ── */
    .pg-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 22px; gap: 12px; flex-wrap: wrap;
    }
    .pg-header h2 { font-size: 22px; font-weight: 800; color: var(--azul); }
    .pg-header p  { font-size: 13px; color: var(--texto-md); margin-top: 3px; }

    /* ── Card ── */
    .card {
      background: var(--branco); border-radius: 12px;
      border: 1px solid var(--cinza-bd);
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .card-header {
      padding: 15px 20px; border-bottom: 1px solid var(--cinza-bd);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-header h3 { font-size: 14px; font-weight: 700; color: var(--azul); }
    .card-body { padding: 20px; }

    /* ── KPI grid ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
    .kpi {
      background: var(--branco); border-radius: 12px;
      border: 1px solid var(--cinza-bd); padding: 20px 18px;
      position: relative; overflow: hidden;
    }
    .kpi::before { content:''; position:absolute; top:0;left:0;right:0;height:3px; background:var(--azul); }
    .kpi.kpi-verde::before { background: var(--verde); }
    .kpi.kpi-neg::before   { background: var(--neg); }
    .kpi-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--texto-md); margin-bottom:8px; }
    .kpi-val   { font-size:26px; font-weight:800; color:var(--azul); line-height:1; margin-bottom:7px; }
    .kpi-val.verde { color: var(--verde); }
    .kpi-val.neg   { color: var(--neg); }
    .kpi-sub   { font-size:12px; color:var(--texto-md); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

    /* ── Badges ── */
    .badge {
      display:inline-flex; align-items:center; gap:3px;
      font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;
    }
    .badge.pos  { background:#D4F5EA; color:#0B6E4F; }
    .badge.neg  { background:#FDEAEA; color:#B91C1C; }
    .badge.neu  { background:#FEF3DC; color:#92500A; }
    .badge.info { background:#EBF4FF; color:#1D3557; }

    /* ── Charts row ── */
    .charts-row { display:grid; grid-template-columns:1.4fr 1fr; gap:20px; margin-bottom:22px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th {
      background:var(--azul); color:#fff;
      padding:10px 14px; text-align:left;
      font-size:11px; font-weight:700; letter-spacing:.4px;
      text-transform:uppercase; white-space:nowrap;
    }
    thead th:not(:first-child) { text-align:right; }
    tbody tr { border-bottom:1px solid #EDF2F7; transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#F7FAFC; }
    tbody td { padding:10px 14px; }
    tbody td:not(:first-child) { text-align:right; font-variant-numeric:tabular-nums; }
    tfoot td {
      background:#EEF2F7; font-weight:700; padding:10px 14px;
      border-top:2px solid var(--cinza-bd);
    }
    tfoot td:not(:first-child) { text-align:right; }
    .var-pos { color:var(--pos); font-weight:700; }
    .var-neg { color:var(--neg); font-weight:700; }
    .var-neu { color:var(--neu); font-weight:700; }
    .tag {
      background:var(--azul); color:#fff; border-radius:4px;
      padding:2px 7px; font-size:11px; font-weight:700; margin-right:6px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      background:var(--branco); border-radius:12px; border:1px solid var(--cinza-bd);
      padding:14px 20px; margin-bottom:20px;
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    }
    .filter-bar label { font-size:12px; font-weight:700; color:var(--texto-md); white-space:nowrap; }
    select, input[type=text], input[type=number] {
      border:1px solid var(--cinza-bd); border-radius:7px;
      padding:7px 10px; font-size:13px; color:var(--texto); background:var(--branco);
      transition:border-color .15s, outline .15s;
    }
    select:focus, input:focus { outline:2px solid var(--verde); border-color:var(--verde); }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 18px; border-radius:8px;
      font-size:13px; font-weight:700; cursor:pointer; border:none; text-decoration:none;
      transition:opacity .15s;
    }
    .btn:hover { opacity:.88; }
    .btn-primary { background:var(--azul); color:#fff; }
    .btn-success { background:var(--verde); color:#fff; }

    /* ── Form ── */
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label { font-size:12px; font-weight:700; color:var(--texto-md); }
    .form-group select, .form-group input { width:100%; }

    /* ── Alert ── */
    .alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; }
    .alert-success { background:#D4F5EA; color:#0B6E4F; border:1px solid #9EE8CC; }

    /* ── Footer ── */
    footer {
      text-align:center; font-size:11px; color:var(--texto-md);
      padding:20px; border-top:1px solid var(--cinza-bd); margin-top:32px;
    }

    /* ── Legend helper ── */
    .chart-legend { display:flex; gap:16px; font-size:12px; font-weight:600; color:var(--texto-md); }
    .chart-legend span { display:flex; align-items:center; gap:5px; }
    .dot { width:12px; height:12px; border-radius:3px; display:inline-block; }

    @media(max-width:960px) { .kpi-grid{ grid-template-columns:repeat(2,1fr); } .charts-row{ grid-template-columns:1fr; } }
    @media(max-width:540px) { .kpi-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-badge">ROV</div>
    <div class="logo-text">
      <h1>Rota Oeste Veículos</h1>
      <p>Sistema Orçamentário</p>
    </div>
  </a>
  <span class="header-env">Ambiente DEV · dados fictícios</span>
</header>

<nav>
  <ul>
    <li><a href="/"          {% if active=='dashboard' %}class="active"{% endif %}>📊 Dashboard</a></li>
    <li><a href="/budget"    {% if active=='budget'    %}class="active"{% endif %}>📋 Budget</a></li>
    <li><a href="/realizado" {% if active=='realizado' %}class="active"{% endif %}>✏️ Realizado</a></li>
    <li><a href="/relatorio" {% if active=='relatorio' %}class="active"{% endif %}>📈 Relatório</a></li>
  </ul>
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<footer>Rota Oeste Veículos — Sistema Orçamentário DEV &nbsp;·&nbsp; {{ today }}</footer>

{% block scripts %}{% endblock %}
</body>
</html>
